<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Treasury"/>
<meta name="theme-color" content="#D4A843"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230D0D0D'/><text y='130' x='20' font-size='110'>💰</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<title>Treasury</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#D4A843;--gold-light:#F5DFA0;--gold-dim:#7A5A20;
  --bg:#0D0D0D;--bg1:#161208;--bg2:#1A1408;--bg3:#2A2010;
  --border:#2A2010;--border2:#3A2E10;
  --text:#E8E0D0;--text2:#A09070;--text3:#5A4A30;
  --red:#E07070;--green:#4ADE80;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;overscroll-behavior:none;}
h1,h2,.serif{font-family:'Playfair Display',serif;}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#header{background:var(--bg2);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 16px 0;flex-shrink:0;}
#header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.header-title .eyebrow{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
.header-title h1{font-size:22px;font-weight:400;color:#F5EFE0;}
.month-selects{display:flex;gap:6px;}
select{background:var(--bg1);border:1px solid var(--border2);color:var(--gold);padding:5px 8px;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none;cursor:pointer;}

/* Tabs */
#tabs{display:flex;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;border-top:1px solid var(--border);}
#tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:10px 16px;font-size:12px;letter-spacing:.5px;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .2s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* Main scroll */
#main{flex:1;overflow-y:auto;padding:16px 16px calc(var(--safe-bot) + 16px);-webkit-overflow-scrolling:touch;}

/* Cards */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.card-label{font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.kpi{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:14px;}
.kpi-label{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.kpi-value{font-size:20px;font-family:'Playfair Display',serif;margin-bottom:2px;}
.kpi-sub{font-size:11px;color:var(--text3);}

/* Alerts */
.alert{background:#2A0A0A;border:1px solid #5A2020;border-radius:10px;padding:12px;margin-bottom:12px;}
.alert-label{font-size:10px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.alert-tags{display:flex;flex-wrap:wrap;gap:6px;}
.alert-tag{background:#3A1010;border:1px solid #5A2020;border-radius:20px;padding:2px 10px;font-size:11px;color:var(--red);}

/* Progress bars */
.prog-item{margin-bottom:14px;}
.prog-header{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;}
.prog-track{background:var(--bg3);border-radius:4px;height:7px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width .5s;}
.prog-foot{font-size:11px;color:var(--text3);margin-top:4px;}

/* Forms */
.form-group{margin-bottom:10px;}
.form-label{font-size:11px;color:var(--text3);margin-bottom:4px;display:block;}
input,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
input:focus,textarea:focus{border-color:var(--gold-dim);}
input[type=checkbox]{width:auto;width:18px;height:18px;cursor:pointer;accent-color:var(--gold);}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;font-weight:500;}
.btn-gold{background:var(--gold);color:#0D0D0D;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text3);font-size:12px;padding:5px 10px;}
.btn-danger{background:none;border:1px solid #3A2020;color:#7A3030;font-size:12px;padding:5px 10px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.full{width:100%;}

/* List rows */
.list-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--bg2);}
.list-row:last-child{border-bottom:none;}
.list-icon{font-size:20px;flex-shrink:0;}
.list-body{flex:1;min-width:0;}
.list-title{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.list-amount{font-size:15px;font-family:'Playfair Display',serif;flex-shrink:0;}
.badge{font-size:10px;border-radius:10px;padding:2px 8px;margin-left:6px;}
.badge-gold{background:#2A2010;border:1px solid #5A4010;color:var(--gold);}
.badge-green{background:#1A3020;border:1px solid #2A5030;color:var(--green);}
.badge-red{background:#2A1010;border:1px solid #5A2010;color:var(--red);}

/* Charts */
svg.chart{overflow:visible;}
.chart-wrap{width:100%;display:flex;justify-content:center;}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* AI Advisor */
#advisor-wrap{display:flex;flex-direction:column;height:100%;}
#chat-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.chat-bubble{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;}
.chat-user{background:var(--bg3);border:1px solid var(--border2);border-radius:12px 12px 4px 12px;align-self:flex-end;}
.chat-ai{background:var(--bg1);border:1px solid var(--border);border-radius:12px 12px 12px 4px;align-self:flex-start;}
.chat-empty{text-align:center;padding:30px 10px;color:var(--text3);font-size:13px;}
.chat-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px;}
.chip{background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--text3);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
#chat-input-area{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
#chat-input{flex:1;resize:none;height:44px;padding:10px 12px;}
#send-btn{flex-shrink:0;width:44px;height:44px;border-radius:10px;padding:0;}

/* Settings */
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bg2);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:14px;color:var(--text);}
.settings-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* Utility */
.gold{color:var(--gold);}
.red{color:var(--red);}
.green{color:var(--green);}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.section-title{font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin:18px 0 10px;}
.empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.flex-row{display:flex;gap:8px;align-items:center;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <div class="header-title">
        <div class="eyebrow">Personal Finance</div>
        <h1>Treasury</h1>
      </div>
      <div class="month-selects">
        <select id="sel-month"></select>
        <select id="sel-year"></select>
      </div>
    </div>
    <div id="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="expenses">Expenses</button>
      <button class="tab" data-tab="payments">Payments</button>
      <button class="tab" data-tab="budget">Budget</button>
      <button class="tab" data-tab="advisor">AI Advisor</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>
  </div>
  <div id="main"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CAT_ICONS = {Housing:'🏠',Food:'🍽️',Transport:'🚗',Health:'💊',Entertainment:'🎬',Utilities:'⚡',Savings:'💰',Education:'📚',Clothing:'👗',Subscriptions:'📱',Other:'📦'};
const COLORS = ['#D4A843','#E8C97A','#C47F17','#F5DFA0','#8B5E0A','#FFECB3','#A67C2E','#B8860B'];
const DEFAULT_CATS = [
  {name:'Housing',budget:1200,color:COLORS[0]},
  {name:'Food',budget:600,color:COLORS[1]},
  {name:'Transport',budget:300,color:COLORS[2]},
  {name:'Health',budget:200,color:COLORS[3]},
  {name:'Entertainment',budget:150,color:COLORS[4]},
  {name:'Utilities',budget:200,color:COLORS[5]},
  {name:'Savings',budget:500,color:COLORS[6]},
  {name:'Other',budget:200,color:COLORS[7]},
];

function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let state = {
  income: load('t-income',{}),
  expenses: load('t-expenses',[]),
  payments: load('t-payments',[]),
  categories: load('t-cats',DEFAULT_CATS),
  apiKey: load('t-apikey',''),
  aiChat: [],
  tab: 'dashboard',
  month: new Date().getMonth(),
  year: new Date().getFullYear(),
};

function fmt(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function monthKey(){return `${state.year}-${state.month}`;}
function monthExpenses(){return state.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===state.month&&d.getFullYear()===state.year;});}
function totalSpent(){return monthExpenses().reduce((s,e)=>s+Number(e.amount),0);}
function totalPayments(){return state.payments.reduce((s,p)=>s+Number(p.amount),0);}
function monthIncome(){return state.income[monthKey()]||0;}
function netBalance(){return monthIncome()-totalSpent()-totalPayments();}
function byCat(){
  const m={};
  state.categories.forEach(c=>{m[c.name]={spent:0,budget:c.budget,color:c.color};});
  monthExpenses().forEach(e=>{if(m[e.category])m[e.category].spent+=Number(e.amount);else if(m['Other'])m['Other'].spent+=Number(e.amount);});
  return m;
}
function saveState(){
  save('t-income',state.income);
  save('t-expenses',state.expenses);
  save('t-payments',state.payments);
  save('t-cats',state.categories);
  save('t-apikey',state.apiKey);
}

// ── SVG CHARTS ────────────────────────────────────────────────────────────────
function donutChart(data,size=160){
  if(!data.length)return '<div class="empty" style="height:120px;display:flex;align-items:center;justify-content:center">No data yet</div>';
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return '<div class="empty" style="height:120px;display:flex;align-items:center;justify-content:center">No spending recorded</div>';
  const cx=size/2,cy=size/2,r=size*0.35,ir=size*0.22;
  let paths='',angle=-Math.PI/2;
  data.forEach(d=>{
    const a=(d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+a),y2=cy+r*Math.sin(angle+a);
    const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+a),iy2=cy+ir*Math.sin(angle+a);
    const lg=a>Math.PI?1:0;
    paths+=`<path d="M${x1} ${y1} A${r} ${r} 0 ${lg} 1 ${x2} ${y2} L${ix2} ${iy2} A${ir} ${ir} 0 ${lg} 0 ${ix1} ${iy1} Z" fill="${d.color}" opacity=".9"/>`;
    angle+=a;
  });
  return `<div class="chart-wrap"><svg width="${size}" height="${size}" class="chart">${paths}</svg></div>`;
}

function barChart(data,w=300,h=120){
  if(!data.length)return '';
  const maxV=Math.max(...data.map(d=>Math.max(d.income||0,d.expenses||0)),1);
  const pad={l:0,r:0,t:8,b:20};
  const bw=(w-pad.l-pad.r)/data.length;
  const bInnerW=bw*0.35;
  let bars='',labels='';
  data.forEach((d,i)=>{
    const x=pad.l+i*bw;
    const ih=((d.income||0)/maxV)*(h-pad.t-pad.b);
    const eh=((d.expenses||0)/maxV)*(h-pad.t-pad.b);
    const by=pad.t+(h-pad.t-pad.b);
    bars+=`<rect x="${x+bw*0.1}" y="${by-ih}" width="${bInnerW}" height="${ih}" fill="#4ADE8055" rx="2"/>`;
    bars+=`<rect x="${x+bw*0.55}" y="${by-eh}" width="${bInnerW}" height="${eh}" fill="#D4A84355" rx="2"/>`;
    labels+=`<text x="${x+bw/2}" y="${h}" text-anchor="middle" fill="#5A4A30" font-size="9">${d.label}</text>`;
  });
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" class="chart">${bars}${labels}</svg>`;
}

// ── RENDER FUNCTIONS ──────────────────────────────────────────────────────────
function renderDashboard(){
  const bc=byCat();
  const over=Object.entries(bc).filter(([,v])=>v.spent>v.budget&&v.budget>0);
  const bal=netBalance();

  // Pie data
  const pieData=Object.entries(bc).map(([name,v],i)=>({name,value:v.spent,color:v.color||COLORS[i%COLORS.length]})).filter(d=>d.value>0);

  // Bar data last 6 months
  const barData=[];
  for(let i=5;i>=0;i--){let m=state.month-i,y=state.year;if(m<0){m+=12;y--;}const k=`${y}-${m}`;const me=state.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;});barData.push({label:MONTHS[m].slice(0,3),income:state.income[k]||0,expenses:me.reduce((s,e)=>s+Number(e.amount),0)+(i===0?totalPayments():0)});}

  return `
    ${over.length?`<div class="alert"><div class="alert-label">⚠ Over Budget</div><div class="alert-tags">${over.map(([cat,v])=>`<span class="alert-tag">${CAT_ICONS[cat]||'📦'} ${cat}: ${fmt(v.spent-v.budget)} over</span>`).join('')}</div></div>`:''}

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Income</div><div class="kpi-value green">${fmt(monthIncome())}</div><div class="kpi-sub">${MONTHS[state.month]} ${state.year}</div></div>
      <div class="kpi"><div class="kpi-label">Expenses</div><div class="kpi-value red">${fmt(totalSpent())}</div><div class="kpi-sub">${monthExpenses().length} transactions</div></div>
      <div class="kpi"><div class="kpi-label">Payments</div><div class="kpi-value gold">${fmt(totalPayments())}</div><div class="kpi-sub">${state.payments.length} recurring</div></div>
      <div class="kpi"><div class="kpi-label">Balance</div><div class="kpi-value ${bal>=0?'green':'red'}">${fmt(bal)}</div><div class="kpi-sub">${bal>=0?'Surplus':'Deficit'}</div></div>
    </div>

    <div class="card">
      <div class="card-label">Set Income for ${MONTHS[state.month]}</div>
      <div class="flex-row">
        <input type="number" id="income-input" placeholder="${monthIncome()?'Current: '+fmt(monthIncome()):'Enter amount...'}" style="flex:1"/>
        <button class="btn btn-gold" onclick="setIncome()" style="flex-shrink:0">Set</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Spending by Category</div>
      ${donutChart(pieData)}
      <div class="legend mt8">
        ${pieData.map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div>${d.name}</div>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-label">6-Month Overview</div>
      ${barChart(barData)}
      <div class="legend mt8">
        <div class="legend-item"><div class="legend-dot" style="background:#4ADE8055;border:1px solid #4ADE80"></div>Income</div>
        <div class="legend-item"><div class="legend-dot" style="background:#D4A84355;border:1px solid #D4A843"></div>Expenses</div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Budget Progress</div>
      ${state.categories.map(c=>{
        const s=bc[c.name]?.spent||0;
        const pct=c.budget>0?Math.min(s/c.budget*100,100):0;
        const over=s>c.budget&&c.budget>0;
        return `<div class="prog-item">
          <div class="prog-header">
            <span style="color:var(--text2)">${CAT_ICONS[c.name]||'📦'} ${c.name}</span>
            <span style="color:${over?'var(--red)':'var(--text3)'}">${fmt(s)} / ${fmt(c.budget)}</span>
          </div>
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${over?'var(--red)':c.color}"></div></div>
          <div class="prog-foot">${c.budget>0?(over?fmt(s-c.budget)+' over budget':fmt(c.budget-s)+' remaining'):'No budget set'}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderExpenses(){
  const me=[...monthExpenses()].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const catOpts=state.categories.map(c=>`<option value="${c.name}">${CAT_ICONS[c.name]||'📦'} ${c.name}</option>`).join('');
  return `
    <div class="card">
      <div class="card-label">Add Expense</div>
      <div class="form-group"><label class="form-label">Description</label><input id="exp-desc" placeholder="What did you spend on?"/></div>
      <div class="two-col">
        <div class="form-group"><label class="form-label">Amount ($)</label><input type="number" id="exp-amount" placeholder="0.00"/></div>
        <div class="form-group"><label class="form-label">Date</label><input type="date" id="exp-date" value="${new Date().toISOString().slice(0,10)}"/></div>
      </div>
      <div class="form-group"><label class="form-label">Category</label><select id="exp-cat" style="width:100%">${catOpts}</select></div>
      <button class="btn btn-gold full" onclick="addExpense()">Add Expense</button>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div class="card-label" style="margin-bottom:0">${MONTHS[state.month]} ${state.year} · ${me.length} transactions</div>
        <span class="gold" style="font-family:'Playfair Display',serif">${fmt(totalSpent())}</span>
      </div>
      ${me.length?me.map(e=>`
        <div class="list-row">
          <div class="list-icon">${CAT_ICONS[e.category]||'📦'}</div>
          <div class="list-body">
            <div class="list-title">${e.desc}</div>
            <div class="list-sub">${e.category} · ${new Date(e.date+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          </div>
          <span class="list-amount red">${fmt(e.amount)}</span>
          <button class="btn-danger" onclick="removeExpense('${e.id}')">×</button>
        </div>`).join(''):'<div class="empty">No expenses this month</div>'}
    </div>
  `;
}

function renderPayments(){
  const catOpts=state.categories.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');
  const sorted=[...state.payments].sort((a,b)=>a.dueDay-b.dueDay);
  const today=new Date();
  return `
    <div class="card">
      <div class="card-label">Add Recurring Payment</div>
      <div class="form-group"><label class="form-label">Name</label><input id="pay-name" placeholder="Netflix, Rent, Insurance..."/></div>
      <div class="two-col">
        <div class="form-group"><label class="form-label">Amount ($)</label><input type="number" id="pay-amount" placeholder="0.00"/></div>
        <div class="form-group"><label class="form-label">Due Day</label><input type="number" id="pay-day" value="1" min="1" max="31"/></div>
      </div>
      <div class="form-group"><label class="form-label">Category</label><select id="pay-cat" style="width:100%">${catOpts}</select></div>
      <div class="flex-row mt8"><input type="checkbox" id="pay-auto"/><label for="pay-auto" style="font-size:13px;color:var(--text2);cursor:pointer">Autopay enabled</label></div>
      <button class="btn btn-gold full" style="margin-top:12px" onclick="addPayment()">Add Payment</button>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div class="card-label" style="margin-bottom:0">Monthly Total</div>
        <span class="gold" style="font-family:'Playfair Display',serif">${fmt(totalPayments())}</span>
      </div>
      ${sorted.length?sorted.map(p=>{
        const due=new Date(state.year,state.month,parseInt(p.dueDay));
        const days=Math.ceil((due-today)/(1000*60*60*24));
        const soon=days>=0&&days<=5;
        const past=days<0&&state.month===today.getMonth()&&state.year===today.getFullYear();
        return `<div class="list-row">
          <div class="list-icon">${CAT_ICONS[p.category]||'💳'}</div>
          <div class="list-body">
            <div class="list-title">${p.name}${p.autopay?'<span class="badge badge-green">AUTO</span>':''}${soon?'<span class="badge badge-gold">SOON</span>':''}${past?'<span class="badge badge-red">PAST</span>':''}</div>
            <div class="list-sub">${p.category} · Due the ${p.dueDay}${['st','nd','rd'][p.dueDay-1]||'th'}</div>
          </div>
          <span class="list-amount gold">${fmt(p.amount)}</span>
          <button class="btn-ghost" onclick="toggleAutopay('${p.id}')" style="font-size:10px">${p.autopay?'Manual':'Auto'}</button>
          <button class="btn-danger" onclick="removePayment('${p.id}')">×</button>
        </div>`;
      }).join(''):'<div class="empty">No recurring payments added</div>'}
    </div>
    ${state.payments.length?`
    <div class="card">
      <div class="card-label">Payment Timeline — ${MONTHS[state.month]}</div>
      ${Array.from({length:31},(_,i)=>i+1).map(day=>{
        const dp=state.payments.filter(p=>parseInt(p.dueDay)===day);
        if(!dp.length)return '';
        return `<div style="background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;margin-bottom:8px">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Day ${day}</div>
          ${dp.map(p=>`<div style="font-size:13px;color:var(--gold)">${p.name} — ${fmt(p.amount)}</div>`).join('')}
        </div>`;
      }).join('')}
    </div>`:''}
  `;
}

function renderBudget(){
  const bc=byCat();
  return `
    ${state.categories.map((c,idx)=>{
      const s=bc[c.name]?.spent||0;
      const pct=c.budget>0?Math.min(s/c.budget*100,100):0;
      const over=s>c.budget&&c.budget>0;
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:15px">${CAT_ICONS[c.name]||'📦'} ${c.name}</div>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="number" id="bud-${c.name}" value="${c.budget}" style="width:90px;text-align:right;padding:5px 8px;font-size:13px"/>
            <button class="btn-ghost" onclick="saveBudget('${c.name}')">Save</button>
          </div>
        </div>
        <div class="prog-track" style="height:8px"><div class="prog-fill" style="width:${pct}%;background:${over?'var(--red)':c.color}"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:6px">
          <span style="font-size:12px;color:${over?'var(--red)':'var(--text2)'}">${fmt(s)} spent</span>
          <span style="font-size:12px;color:${over?'var(--red)':'var(--text3)'}">${c.budget>0?(over?fmt(s-c.budget)+' over':fmt(c.budget-s)+' left'):'No limit'}</span>
        </div>
      </div>`;
    }).join('')}
  `;
}

function renderAdvisor(){
  const chips=['How is my spending this month?','Where can I cut back?','Am I saving enough?','Analyze my fixed payments'];
  const hasKey=!!state.apiKey;
  return `
    ${!hasKey?`<div class="card" style="border-color:#3A2E10"><div class="card-label" style="color:var(--gold)">⚙ API Key Required</div><p style="font-size:13px;color:var(--text3);margin-bottom:10px">Add your Anthropic API key in Settings to use the AI Advisor.</p><button class="btn btn-gold" onclick="switchTab('settings')">Go to Settings</button></div>`:''}
    <div id="advisor-wrap" style="height:calc(100dvh - 280px);display:flex;flex-direction:column">
      <div id="chat-area">
        ${state.aiChat.length===0?`
        <div class="chat-empty">
          <div style="font-size:32px;margin-bottom:10px">💬</div>
          <div>Your AI financial advisor is ready.</div>
          <div class="chat-chips">${chips.map(q=>`<button class="chip" onclick="fillChat(\`${q}\`)">${q}</button>`).join('')}</div>
        </div>`:state.aiChat.map(m=>`<div class="chat-bubble ${m.role==='user'?'chat-user':'chat-ai'}">${m.text}</div>`).join('')}
      </div>
      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="Ask your financial advisor..." rows="1"></textarea>
        <button id="send-btn" class="btn btn-gold" onclick="sendChat()">→</button>
      </div>
    </div>
  `;
}

function renderSettings(){
  return `
    <div class="card">
      <div class="card-label">AI Advisor</div>
      <div class="form-group">
        <label class="form-label">Anthropic API Key</label>
        <input type="password" id="api-key-input" value="${state.apiKey}" placeholder="sk-ant-..."/>
      </div>
      <p style="font-size:12px;color:var(--text3);margin-bottom:10px">Get your key at <strong style="color:var(--gold)">console.anthropic.com</strong>. Stored locally on your device only.</p>
      <button class="btn btn-gold" onclick="saveApiKey()">Save API Key</button>
    </div>
    <div class="card">
      <div class="card-label">Categories</div>
      ${state.categories.map(c=>`
        <div class="settings-row">
          <div>
            <div class="settings-label">${CAT_ICONS[c.name]||'📦'} ${c.name}</div>
            <div class="settings-sub">Budget: ${fmt(c.budget)}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-label">Data Management</div>
      <p style="font-size:13px;color:var(--text3);margin-bottom:12px">All data is stored locally on this device.</p>
      <button class="btn btn-danger full" onclick="clearData()">Clear All Data</button>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:11px;color:var(--text3)">Treasury PWA · Built with ❤️</div>
    </div>
  `;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setIncome(){
  const v=parseFloat(document.getElementById('income-input')?.value);
  if(!v)return;
  state.income[monthKey()]=v;
  saveState();render();
}

function addExpense(){
  const desc=document.getElementById('exp-desc')?.value?.trim();
  const amount=parseFloat(document.getElementById('exp-amount')?.value);
  const cat=document.getElementById('exp-cat')?.value;
  const date=document.getElementById('exp-date')?.value;
  if(!desc||!amount||!date)return alert('Please fill in all fields.');
  state.expenses.push({id:Date.now()+'',desc,amount,category:cat,date});
  saveState();render();
}

function removeExpense(id){
  state.expenses=state.expenses.filter(e=>e.id!==id);
  saveState();render();
}

function addPayment(){
  const name=document.getElementById('pay-name')?.value?.trim();
  const amount=parseFloat(document.getElementById('pay-amount')?.value);
  const dueDay=parseInt(document.getElementById('pay-day')?.value)||1;
  const category=document.getElementById('pay-cat')?.value;
  const autopay=document.getElementById('pay-auto')?.checked||false;
  if(!name||!amount)return alert('Please fill in name and amount.');
  state.payments.push({id:Date.now()+'',name,amount,dueDay,category,autopay});
  saveState();render();
}

function removePayment(id){
  state.payments=state.payments.filter(p=>p.id!==id);
  saveState();render();
}

function toggleAutopay(id){
  state.payments=state.payments.map(p=>p.id===id?{...p,autopay:!p.autopay}:p);
  saveState();render();
}

function saveBudget(name){
  const v=parseFloat(document.getElementById('bud-'+name)?.value)||0;
  state.categories=state.categories.map(c=>c.name===name?{...c,budget:v}:c);
  saveState();render();
}

function saveApiKey(){
  state.apiKey=document.getElementById('api-key-input')?.value?.trim()||'';
  saveState();
  alert(state.apiKey?'API key saved!':'API key cleared.');
}

function clearData(){
  if(!confirm('Clear all your financial data? This cannot be undone.'))return;
  state.income={};state.expenses=[];state.payments=[];
  state.categories=DEFAULT_CATS;state.aiChat=[];
  saveState();render();
}

function fillChat(text){
  const el=document.getElementById('chat-input');
  if(el){el.value=text;el.focus();}
}

async function sendChat(){
  const el=document.getElementById('chat-input');
  const msg=el?.value?.trim();
  if(!msg)return;
  if(!state.apiKey){alert('Please add your Anthropic API key in Settings first.');return;}
  el.value='';
  state.aiChat.push({role:'user',text:msg});
  render();scrollChat();

  const bc=byCat();
  const ctx=`You are a friendly expert personal finance advisor. User's data:
- Month: ${MONTHS[state.month]} ${state.year}
- Income: ${fmt(monthIncome())}
- Fixed Payments: ${fmt(totalPayments())} (${state.payments.map(p=>p.name+': '+fmt(p.amount)).join(', ')||'none'})
- Variable Expenses: ${fmt(totalSpent())}
- Net Balance: ${fmt(netBalance())}
- By Category: ${Object.entries(bc).map(([k,v])=>`${k}: spent ${fmt(v.spent)} of ${fmt(v.budget)}`).join(', ')}
Give concise, actionable advice under 200 words.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:ctx,messages:state.aiChat.map(m=>({role:m.role,content:m.text}))})
    });
    const data=await res.json();
    if(data.error){state.aiChat.push({role:'assistant',text:'Error: '+data.error.message});}
    else{state.aiChat.push({role:'assistant',text:data.content[0].text});}
  }catch(e){
    state.aiChat.push({role:'assistant',text:'Connection error. Check your API key and try again.'});
  }
  render();scrollChat();
}

function scrollChat(){
  setTimeout(()=>{
    const el=document.getElementById('chat-area');
    if(el)el.scrollTop=el.scrollHeight;
  },50);
}

function switchTab(t){
  state.tab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const main=document.getElementById('main');
  switch(state.tab){
    case 'dashboard': main.innerHTML=renderDashboard();break;
    case 'expenses': main.innerHTML=renderExpenses();break;
    case 'payments': main.innerHTML=renderPayments();break;
    case 'budget': main.innerHTML=renderBudget();break;
    case 'advisor': main.innerHTML=renderAdvisor();scrollChat();break;
    case 'settings': main.innerHTML=renderSettings();break;
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  // Month/year selectors
  const ms=document.getElementById('sel-month');
  const ys=document.getElementById('sel-year');
  MONTHS.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=m;if(i===state.month)o.selected=true;ms.appendChild(o);});
  [2023,2024,2025,2026].forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;if(y===state.year)o.selected=true;ys.appendChild(o);});
  ms.onchange=()=>{state.month=+ms.value;render();};
  ys.onchange=()=>{state.year=+ys.value;render();};

  // Tabs
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>switchTab(t.dataset.tab);
  });

  // Chat enter key
  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey&&document.activeElement?.id==='chat-input'){e.preventDefault();sendChat();}
  });

  render();

  // Service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
